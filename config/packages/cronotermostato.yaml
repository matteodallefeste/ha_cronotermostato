# =====================================================================
# CRONOTERMOSTATO SETTIMANALE - PACKAGE
# =====================================================================
# Va in:  <config>/packages/cronotermostato.yaml
# Richiede in configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages
#
# I profili / la settimana / gli override si configurano nel file:
#   <config>/custom_templates/cronotermostato.jinja
#
# Qui si configurano solo:
#   - gli helper di runtime (modalita', isteresi, temperature manuali)
#   - i sensori target per zona
#   - le automazioni di controllo (una per STANZA: sensore + attuatori)
# =====================================================================

# ---------------------------------------------------------------------
# HELPER GLOBALI
# ---------------------------------------------------------------------
input_boolean:
  cronotermostato_master:
    name: Cronotermostato attivo
    icon: mdi:thermostat

# ---------------------------------------------------------------------
# HELPER PER ZONA  (duplica il blocco cambiando il suffisso zona)
# Ogni zona ha la propria isteresi (configurabile).
# ---------------------------------------------------------------------
input_number:
  crono_casa_isteresi:
    name: Casa - isteresi (°C)
    min: 0.1
    max: 3
    step: 0.1
    initial: 0.3
    unit_of_measurement: "°C"
    icon: mdi:arrow-expand-vertical
  crono_casa_manuale:
    name: Casa - temperatura manuale
    min: 5
    max: 30
    step: 0.5
    initial: 20
    unit_of_measurement: "°C"
  crono_casa_vacanza:
    name: Casa - temperatura vacanza
    min: 5
    max: 30
    step: 0.5
    initial: 16
    unit_of_measurement: "°C"
  crono_casa_antigelo:
    name: Casa - antigelo (off)
    min: 3
    max: 15
    step: 0.5
    initial: 7
    unit_of_measurement: "°C"

  crono_ufficio_isteresi:
    name: Ufficio - isteresi (°C)
    min: 0.1
    max: 3
    step: 0.1
    initial: 0.3
    unit_of_measurement: "°C"
    icon: mdi:arrow-expand-vertical
  crono_ufficio_manuale:
    name: Ufficio - temperatura manuale
    min: 5
    max: 30
    step: 0.5
    initial: 20
    unit_of_measurement: "°C"
  crono_ufficio_vacanza:
    name: Ufficio - temperatura vacanza
    min: 5
    max: 30
    step: 0.5
    initial: 16
    unit_of_measurement: "°C"
  crono_ufficio_antigelo:
    name: Ufficio - antigelo (off)
    min: 3
    max: 15
    step: 0.5
    initial: 7
    unit_of_measurement: "°C"

input_select:
  crono_casa_mode:
    name: Casa - modalita'
    options:
      - auto
      - manuale
      - vacanza
      - off
    initial: auto
    icon: mdi:tune-variant
  crono_casa_hvac:
    name: Casa - riscaldamento/raffrescamento
    options:
      - riscaldamento
      - raffrescamento
    initial: riscaldamento
    icon: mdi:sun-snowflake-variant
  crono_ufficio_hvac:
    name: Ufficio - riscaldamento/raffrescamento
    options:
      - riscaldamento
      - raffrescamento
    initial: riscaldamento
    icon: mdi:sun-snowflake-variant
  crono_ufficio_mode:
    name: Ufficio - modalita'
    options:
      - auto
      - manuale
      - vacanza
      - off
    initial: auto
    icon: mdi:tune-variant

# ---------------------------------------------------------------------
# SENSORI TEMPLATE  (profilo attivo + target programma + target effettivo)
# ---------------------------------------------------------------------
template:
  - sensor:
      # ---- ZONA CASA ----
      - name: "Crono Casa profilo attivo"
        unique_id: crono_casa_profilo
        icon: mdi:calendar-clock
        state: >
          {% from 'cronotermostato.jinja' import active_profile %}
          {{ active_profile('casa') | trim }}

      - name: "Crono Casa target programma"
        unique_id: crono_casa_target_prog
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% from 'cronotermostato.jinja' import scheduled_target %}
          {{ scheduled_target('casa') | trim }}

      - name: "Crono Casa target effettivo"
        unique_id: crono_casa_target_eff
        unit_of_measurement: "°C"
        device_class: temperature
        icon: mdi:thermometer-check
        state: >
          {% set mode = states('input_select.crono_casa_mode') %}
          {% if mode == 'off' %}
            {{ states('input_number.crono_casa_antigelo') }}
          {% elif mode == 'manuale' %}
            {{ states('input_number.crono_casa_manuale') }}
          {% elif mode == 'vacanza' %}
            {{ states('input_number.crono_casa_vacanza') }}
          {% else %}
            {{ states('sensor.crono_casa_target_programma') }}
          {% endif %}

      # ---- ZONA UFFICIO ----
      - name: "Crono Ufficio profilo attivo"
        unique_id: crono_ufficio_profilo
        icon: mdi:calendar-clock
        state: >
          {% from 'cronotermostato.jinja' import active_profile %}
          {{ active_profile('ufficio') | trim }}

      - name: "Crono Ufficio target programma"
        unique_id: crono_ufficio_target_prog
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% from 'cronotermostato.jinja' import scheduled_target %}
          {{ scheduled_target('ufficio') | trim }}

      - name: "Crono Ufficio target effettivo"
        unique_id: crono_ufficio_target_eff
        unit_of_measurement: "°C"
        device_class: temperature
        icon: mdi:thermometer-check
        state: >
          {% set mode = states('input_select.crono_ufficio_mode') %}
          {% if mode == 'off' %}
            {{ states('input_number.crono_ufficio_antigelo') }}
          {% elif mode == 'manuale' %}
            {{ states('input_number.crono_ufficio_manuale') }}
          {% elif mode == 'vacanza' %}
            {{ states('input_number.crono_ufficio_vacanza') }}
          {% else %}
            {{ states('sensor.crono_ufficio_target_programma') }}
          {% endif %}

# ---------------------------------------------------------------------
# BINARY SENSOR "RICHIESTA" - UNO PER STANZA  (fonte di verita' leggibile)
# ---------------------------------------------------------------------
# on  = la stanza sta chiedendo caldo/freddo (secondo la modalita' hvac)
# off = soddisfatta / disabilitata / dati non validi
# L'isteresi e' implementata tenendo lo stato precedente (this.state) dentro
# la banda morta. Questi sensori possono essere letti/intercettati da
# qualsiasi altra automazione, dashboard o entita'.
#
# Blocco unico per zona: i trigger valgono per tutte le stanze della zona.
# Per aggiungere una stanza: aggiungi il suo sensore ai trigger e un nuovo
# elemento binary_sensor (cambia name/unique_id e il sensore stanza).
# ---------------------------------------------------------------------
  # ===== ZONA CASA =====
  - trigger:
      - platform: state
        entity_id:
          - sensor.temperatura_soggiorno               # <-- SENSORE stanza
          - sensor.temperatura_camera                  # <-- SENSORE stanza
          - sensor.crono_casa_target_effettivo
          - input_number.crono_casa_isteresi
          - input_select.crono_casa_hvac
          - input_select.crono_casa_mode
          - input_boolean.cronotermostato_master
      - platform: time_pattern
        minutes: "/2"
    binary_sensor:
      - name: "Crono Casa Soggiorno richiesta"
        unique_id: crono_casa_soggiorno_richiesta
        device_class: running
        state: >
          {% set cur = states('sensor.temperatura_soggiorno') | float(none) %}
          {% set tgt = states('sensor.crono_casa_target_effettivo') | float(none) %}
          {% set h = states('input_number.crono_casa_isteresi') | float(0.3) %}
          {% set cooling = is_state('input_select.crono_casa_hvac', 'raffrescamento') %}
          {% set off = is_state('input_select.crono_casa_mode', 'off') %}
          {% set on_now = is_state('input_boolean.cronotermostato_master', 'on') %}
          {% set prev = is_state(this.entity_id, 'on') %}
          {% if not on_now or cur is none or tgt is none or (cooling and off) %} off
          {% elif cooling %}
            {% if cur > tgt + h %} on {% elif cur < tgt - h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% else %}
            {% if cur < tgt - h %} on {% elif cur > tgt + h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% endif %}
        attributes:
          modalita: "{{ 'raffrescamento' if is_state('input_select.crono_casa_hvac', 'raffrescamento') else 'riscaldamento' }}"
          temperatura: "{{ states('sensor.temperatura_soggiorno') }}"
          target: "{{ states('sensor.crono_casa_target_effettivo') }}"

      - name: "Crono Casa Camera richiesta"
        unique_id: crono_casa_camera_richiesta
        device_class: running
        state: >
          {% set cur = states('sensor.temperatura_camera') | float(none) %}
          {% set tgt = states('sensor.crono_casa_target_effettivo') | float(none) %}
          {% set h = states('input_number.crono_casa_isteresi') | float(0.3) %}
          {% set cooling = is_state('input_select.crono_casa_hvac', 'raffrescamento') %}
          {% set off = is_state('input_select.crono_casa_mode', 'off') %}
          {% set on_now = is_state('input_boolean.cronotermostato_master', 'on') %}
          {% set prev = is_state(this.entity_id, 'on') %}
          {% if not on_now or cur is none or tgt is none or (cooling and off) %} off
          {% elif cooling %}
            {% if cur > tgt + h %} on {% elif cur < tgt - h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% else %}
            {% if cur < tgt - h %} on {% elif cur > tgt + h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% endif %}
        attributes:
          modalita: "{{ 'raffrescamento' if is_state('input_select.crono_casa_hvac', 'raffrescamento') else 'riscaldamento' }}"
          temperatura: "{{ states('sensor.temperatura_camera') }}"
          target: "{{ states('sensor.crono_casa_target_effettivo') }}"

  # ===== ZONA UFFICIO =====
  - trigger:
      - platform: state
        entity_id:
          - sensor.temperatura_openspace               # <-- SENSORE stanza
          - sensor.crono_ufficio_target_effettivo
          - input_number.crono_ufficio_isteresi
          - input_select.crono_ufficio_hvac
          - input_select.crono_ufficio_mode
          - input_boolean.cronotermostato_master
      - platform: time_pattern
        minutes: "/2"
    binary_sensor:
      - name: "Crono Ufficio Open space richiesta"
        unique_id: crono_ufficio_openspace_richiesta
        device_class: running
        state: >
          {% set cur = states('sensor.temperatura_openspace') | float(none) %}
          {% set tgt = states('sensor.crono_ufficio_target_effettivo') | float(none) %}
          {% set h = states('input_number.crono_ufficio_isteresi') | float(0.3) %}
          {% set cooling = is_state('input_select.crono_ufficio_hvac', 'raffrescamento') %}
          {% set off = is_state('input_select.crono_ufficio_mode', 'off') %}
          {% set on_now = is_state('input_boolean.cronotermostato_master', 'on') %}
          {% set prev = is_state(this.entity_id, 'on') %}
          {% if not on_now or cur is none or tgt is none or (cooling and off) %} off
          {% elif cooling %}
            {% if cur > tgt + h %} on {% elif cur < tgt - h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% else %}
            {% if cur < tgt - h %} on {% elif cur > tgt + h %} off {% else %} {{ 'on' if prev else 'off' }} {% endif %}
          {% endif %}
        attributes:
          modalita: "{{ 'raffrescamento' if is_state('input_select.crono_ufficio_hvac', 'raffrescamento') else 'riscaldamento' }}"
          temperatura: "{{ states('sensor.temperatura_openspace') }}"
          target: "{{ states('sensor.crono_ufficio_target_effettivo') }}"

# ---------------------------------------------------------------------
# AUTOMAZIONI DI ATTUAZIONE  -  UNA PER STANZA
# ---------------------------------------------------------------------
# Rispecchiano il binary_sensor "richiesta" sugli attuatori fisici.
# Per stanza configuri due liste:
#   - actuators_heat : attuatori usati in RISCALDAMENTO
#   - actuators_cool : attuatori usati in RAFFRESCAMENTO
#     (se lasciata vuota [] riusa gli stessi attuatori del riscaldamento)
# Il set non attivo viene SEMPRE spento (mai caldo e freddo insieme).
# ---------------------------------------------------------------------
automation:
  # ===== ZONA CASA - Stanza: Soggiorno =====
  - id: crono_casa_soggiorno_attuatori
    alias: "Crono Casa / Soggiorno - attuatori"
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.crono_casa_soggiorno_richiesta
          - input_select.crono_casa_hvac
    action:
      - variables:
          actuators_heat:                                  # <-- ATTUATORI riscaldamento
            - switch.rele_soggiorno
          actuators_cool: []                               # <-- ATTUATORI raffrescamento ([] = come heat)
          cooling: "{{ is_state('input_select.crono_casa_hvac', 'raffrescamento') }}"
          demand: "{{ is_state('binary_sensor.crono_casa_soggiorno_richiesta', 'on') }}"
          cool_set: "{{ actuators_cool if actuators_cool | length > 0 else actuators_heat }}"
          active: "{{ cool_set if cooling else actuators_heat }}"
          idle: "{{ (actuators_heat if cooling else cool_set) | reject('in', active) | list }}"
      # spegni sempre gli attuatori del sistema NON attivo
      - if: "{{ idle | length > 0 }}"
        then:
          - service: homeassistant.turn_off
            target: { entity_id: "{{ idle }}" }
      # accendi/spegni gli attuatori attivi in base alla richiesta
      - service: "homeassistant.turn_{{ 'on' if demand else 'off' }}"
        target: { entity_id: "{{ active }}" }

  # ===== ZONA CASA - Stanza: Camera =====
  - id: crono_casa_camera_attuatori
    alias: "Crono Casa / Camera - attuatori"
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.crono_casa_camera_richiesta
          - input_select.crono_casa_hvac
    action:
      - variables:
          actuators_heat:                                  # <-- ATTUATORI riscaldamento
            - switch.rele_camera
          actuators_cool: []                               # <-- ATTUATORI raffrescamento ([] = come heat)
          cooling: "{{ is_state('input_select.crono_casa_hvac', 'raffrescamento') }}"
          demand: "{{ is_state('binary_sensor.crono_casa_camera_richiesta', 'on') }}"
          cool_set: "{{ actuators_cool if actuators_cool | length > 0 else actuators_heat }}"
          active: "{{ cool_set if cooling else actuators_heat }}"
          idle: "{{ (actuators_heat if cooling else cool_set) | reject('in', active) | list }}"
      - if: "{{ idle | length > 0 }}"
        then:
          - service: homeassistant.turn_off
            target: { entity_id: "{{ idle }}" }
      - service: "homeassistant.turn_{{ 'on' if demand else 'off' }}"
        target: { entity_id: "{{ active }}" }

  # ===== ZONA UFFICIO - Stanza: Open space =====
  # Esempio con attuatori DIVERSI per caldo e freddo.
  - id: crono_ufficio_openspace_attuatori
    alias: "Crono Ufficio / Open space - attuatori"
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.crono_ufficio_openspace_richiesta
          - input_select.crono_ufficio_hvac
    action:
      - variables:
          actuators_heat:                                  # <-- ATTUATORI riscaldamento
            - switch.rele_openspace_1
            - switch.rele_openspace_2
          actuators_cool:                                  # <-- ATTUATORI raffrescamento (diversi)
            - switch.condizionatore_openspace
          cooling: "{{ is_state('input_select.crono_ufficio_hvac', 'raffrescamento') }}"
          demand: "{{ is_state('binary_sensor.crono_ufficio_openspace_richiesta', 'on') }}"
          cool_set: "{{ actuators_cool if actuators_cool | length > 0 else actuators_heat }}"
          active: "{{ cool_set if cooling else actuators_heat }}"
          idle: "{{ (actuators_heat if cooling else cool_set) | reject('in', active) | list }}"
      - if: "{{ idle | length > 0 }}"
        then:
          - service: homeassistant.turn_off
            target: { entity_id: "{{ idle }}" }
      - service: "homeassistant.turn_{{ 'on' if demand else 'off' }}"
        target: { entity_id: "{{ active }}" }
